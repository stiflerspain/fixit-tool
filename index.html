/* ================================================================
   EXISTING TABS — Dashboard, Comparador, Escalamiento, Publicidad
   ================================================================ */
function TabDashboard({ params, drive, meli }) {
  const [dateRange, setDateRange] = useState('7d');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo, setCustomTo] = useState('');
  const [pubGlobal, setPubGlobal] = useState(0);
  const [mappingItem, setMappingItem] = useState(null); // item id being mapped

  const getDateRange = () => {
    const now = new Date();
    const to = now.toISOString();
    if (dateRange === 'today') {
      const from = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
      return { from, to };
    } else if (dateRange === '7d') {
      const from = new Date(now.getTime() - 7 * 86400000).toISOString();
      return { from, to };
    } else if (dateRange === '30d') {
      const from = new Date(now.getTime() - 30 * 86400000).toISOString();
      return { from, to };
    } else if (dateRange === 'custom' && customFrom && customTo) {
      return { from: new Date(customFrom).toISOString(), to: new Date(customTo + 'T23:59:59').toISOString() };
    }
    const from = new Date(now.getTime() - 7 * 86400000).toISOString();
    return { from, to };
  };

  const handleSync = () => {
    if (meli.meliStatus !== 'connected') return;
    const { from, to } = getDateRange();
    meli.fetchDashboardData(from, to);
  };

  // Auto-sync on connect or date change
  useEffect(() => {
    if (meli.meliStatus === 'connected') handleSync();
  }, [meli.meliStatus, dateRange, customFrom, customTo]);

  // Build per-item data from orders
  const itemData = React.useMemo(() => {
    if (!meli.dashData || !meli.items.length) return {};
    const data = {};
    meli.items.forEach(item => {
      data[item.id] = { id: item.id, title: item.title, thumbnail: item.thumbnail, price: item.price, status: item.status, permalink: item.permalink,
        totalQty: 0, totalRevenue: 0, totalFee: 0, totalShipping: 0, shipmentIds: {} };
    });
    (meli.dashData.orders || []).forEach(order => {
      if (order.status !== 'paid') return;
      (order.order_items || []).forEach(oi => {
        var itemId = oi.item && oi.item.id;
        if (!itemId || !data[itemId]) return;
        var d = data[itemId];
        d.totalQty += oi.quantity;
        d.totalRevenue += oi.unit_price * oi.quantity;
        d.totalFee += oi.sale_fee || 0;
      });
      if (order.shipping && order.shipping.id) {
        (order.order_items || []).forEach(oi => {
          var itemId = oi.item && oi.item.id;
          if (itemId && data[itemId]) data[itemId].shipmentIds[order.shipping.id] = true;
        });
      }
    });
    // Add shipping costs
    Object.values(data).forEach(d => {
      Object.keys(d.shipmentIds).forEach(sid => {
        var sc = meli.dashData.shipments[sid];
        if (sc) {
          d.totalShipping += (sc.receiver && sc.receiver.cost || 0) - (sc.senders && sc.senders[0] && sc.senders[0].cost || 0);
        }
      });
    });
    return data;
  }, [meli.dashData, meli.items]);

  // Get cotizacion cost by ID
  const getCotCost = (cotId) => {
    if (!drive || !drive.cotizaciones) return null;
    var cot = drive.cotizaciones.find(c => c.id === cotId);
    return cot && cot.resultados ? cot.resultados.costoBodegaCLP : null;
  };

  // Calculate weighted cost for an item
  const getWeightedCost = (itemId) => {
    var m = meli.mappings.mappings[itemId];
    if (!m || !m.cotizaciones || m.cotizaciones.length === 0) return null;
    var totalCost = 0, totalUnits = 0;
    m.cotizaciones.forEach(cotId => {
      var cost = getCotCost(cotId);
      var units = (m.unidadesPorCot && m.unidadesPorCot[cotId]) || 1;
      if (cost !== null) { totalCost += cost * units; totalUnits += units; }
    });
    return totalUnits > 0 ? totalCost / totalUnits : null;
  };

  // Toggle cotizacion mapping
  const toggleCotMapping = (itemId, cotId) => {
    var current = meli.mappings.mappings[itemId] || { cotizaciones: [], unidadesPorCot: {} };
    var cots = current.cotizaciones.slice();
    var units = Object.assign({}, current.unidadesPorCot);
    var idx = cots.indexOf(cotId);
    if (idx >= 0) { cots.splice(idx, 1); delete units[cotId]; }
    else { cots.push(cotId); units[cotId] = 1; }
    var newMappings = Object.assign({}, meli.mappings, { mappings: Object.assign({}, meli.mappings.mappings, { [itemId]: { cotizaciones: cots, unidadesPorCot: units } }) });
    meli.saveMappings(newMappings);
  };

  const setCotUnits = (itemId, cotId, units) => {
    var current = meli.mappings.mappings[itemId] || { cotizaciones: [], unidadesPorCot: {} };
    var newUnits = Object.assign({}, current.unidadesPorCot, { [cotId]: parseFloat(units) || 1 });
    var newMappings = Object.assign({}, meli.mappings, { mappings: Object.assign({}, meli.mappings.mappings, { [itemId]: { cotizaciones: current.cotizaciones, unidadesPorCot: newUnits } }) });
    meli.saveMappings(newMappings);
  };

  // Global KPIs
  const allItemData = Object.values(itemData);
  const totalQty = allItemData.reduce((a, d) => a + d.totalQty, 0);
  const totalRevenue = allItemData.reduce((a, d) => a + d.totalRevenue, 0);
  const totalFees = allItemData.reduce((a, d) => a + d.totalFee, 0);
  const totalShipping = allItemData.reduce((a, d) => a + d.totalShipping, 0);
  const totalNeto = totalRevenue - totalFees - totalShipping;
  const pubPorVenta = totalQty > 0 ? pubGlobal / totalQty : 0;

  // Weighted average margin (only items with cost assigned)
  var marginSum = 0, marginWeight = 0;
  allItemData.forEach(d => {
    var wc = getWeightedCost(d.id);
    if (wc !== null && d.totalQty > 0 && d.totalRevenue > 0) {
      var costoTotal = wc * d.totalQty;
      var pubItem = pubPorVenta * d.totalQty;
      var ganancia = (d.totalRevenue - d.totalFee - d.totalShipping) - costoTotal - pubItem;
      var margen = ganancia / d.totalRevenue * 100;
      marginSum += margen * d.totalRevenue;
      marginWeight += d.totalRevenue;
    }
  });
  const avgMargin = marginWeight > 0 ? marginSum / marginWeight : null;

  const colorMargen = (v) => v === null ? "secondary" : v > 20 ? "success" : v > 0 ? "warning" : "danger";
  const btnStyle = (active) => ({ fontSize: 12, padding: "6px 14px", background: active ? "var(--color-background-info)" : "var(--color-background-secondary)", border: "0.5px solid " + (active ? "var(--color-border-info)" : "var(--color-border-secondary)"), borderRadius: "var(--border-radius-md)", cursor: "pointer", color: active ? "var(--color-text-info)" : "var(--color-text-secondary)", fontFamily: "inherit" });

  // Not connected state
  if (meli.meliStatus !== 'connected') {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px" }}>
        <div style={{ fontSize: 40, marginBottom: 16 }}>&#128722;</div>
        <h3 style={{ margin: "0 0 8px", color: "var(--color-text-primary)" }}>Conecta tu cuenta de MercadoLibre</h3>
        <p style={{ color: "var(--color-text-secondary)", marginBottom: 20, fontSize: 14 }}>Sincroniza tus ventas, comisiones y envios para calcular el margen real de cada producto.</p>
        <button onClick={meli.login} style={{ ...btnStyle(true), fontSize: 14, padding: "10px 24px" }}>
          {meli.meliStatus === 'loading' ? 'Conectando...' : 'Conectar MercadoLibre'}
        </button>
        {meli.meliStatus === 'error' && <p style={{ color: "var(--color-text-danger)", marginTop: 12, fontSize: 13 }}>Error: {window._mlAuthError || 'Error de conexion'}. Intenta nuevamente.</p>}
      </div>
    );
  }

  return (
    <div>
      {/* Controls bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
          {[['today','Hoy'],['7d','7 dias'],['30d','30 dias'],['custom','Personalizado']].map(([id,label]) => (
            <button key={id} onClick={() => setDateRange(id)} style={btnStyle(dateRange === id)}>{label}</button>
          ))}
          {dateRange === 'custom' && (
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              <input type="date" value={customFrom} onChange={e => setCustomFrom(e.target.value)} style={{ ...S.input, fontSize: 12, padding: "5px 8px" }} />
              <span style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>a</span>
              <input type="date" value={customTo} onChange={e => setCustomTo(e.target.value)} style={{ ...S.input, fontSize: 12, padding: "5px 8px" }} />
            </div>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={S.mc}>
            <p style={{ ...S.label, marginBottom: 2 }}>Publicidad total</p>
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>$</span>
              <input type="number" value={pubGlobal} onChange={e => setPubGlobal(parseFloat(e.target.value) || 0)} style={{ ...S.input, width: 100, fontSize: 13, fontWeight: 500 }} />
            </div>
          </div>
          <button onClick={handleSync} disabled={meli.loading} style={{ ...btnStyle(false), display: "flex", alignItems: "center", gap: 4 }}>
            {meli.loading ? '&#8987; Sincronizando...' : '&#8635; Sincronizar'}
          </button>
          {meli.lastSync && <span style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>Sync: {meli.lastSync.toLocaleTimeString('es-CL')}</span>}
        </div>
      </div>

      {/* KPI cards */}
      <div className="grid-3" style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0,1fr))", gap: 10, marginBottom: 16 }}>
        {[
          { label: "Ventas totales", val: totalQty + " unid.", color: "primary" },
          { label: "Ingresos brutos", val: "$" + fmt(totalRevenue), color: "primary" },
          { label: "Comisiones ML", val: "$" + fmt(totalFees), color: "danger" },
          { label: "Envio neto", val: "$" + fmt(totalShipping), color: totalShipping >= 0 ? "success" : "danger" },
          { label: "Neto total", val: "$" + fmt(totalNeto), color: totalNeto >= 0 ? "success" : "danger" },
          { label: "Margen promedio", val: avgMargin !== null ? pct(avgMargin) : "Sin datos", color: colorMargen(avgMargin), sub: avgMargin === null ? "Asigna cotizaciones" : "" },
        ].map(kpi => (
          <div key={kpi.label} style={S.mc}>
            <p style={S.label}>{kpi.label}</p>
            <p style={{ fontSize: 20, fontWeight: 500, margin: 0, color: "var(--color-text-" + kpi.color + ")" }}>{kpi.val}</p>
            {kpi.sub && <p style={S.sub}>{kpi.sub}</p>}
          </div>
        ))}
      </div>

      {/* Loading state */}
      {meli.loading && <div style={{ textAlign: "center", padding: 20, color: "var(--color-text-tertiary)" }}>&#8987; Cargando datos de MercadoLibre...</div>}

      {/* Product cards */}
      {!meli.loading && meli.items.map(item => {
        var d = itemData[item.id] || { totalQty: 0, totalRevenue: 0, totalFee: 0, totalShipping: 0 };
        var wc = getWeightedCost(item.id);
        var netoItem = d.totalRevenue - d.totalFee - d.totalShipping;
        var costoImportTotal = wc !== null ? wc * d.totalQty : null;
        var pubItem = pubPorVenta * d.totalQty;
        var ganancia = costoImportTotal !== null ? netoItem - costoImportTotal - pubItem : null;
        var margen = ganancia !== null && d.totalRevenue > 0 ? ganancia / d.totalRevenue * 100 : null;
        var visits = meli.dashData && meli.dashData.visits && meli.dashData.visits[item.id] || 0;
        var conversion = visits > 0 ? d.totalQty / visits * 100 : null;
        var borderColor = margen === null ? "var(--color-border-tertiary)" : margen > 20 ? "var(--color-border-success)" : margen > 0 ? "var(--color-border-warning)" : "var(--color-border-danger)";
        var isMappingOpen = mappingItem === item.id;
        var currentMapping = meli.mappings.mappings[item.id] || { cotizaciones: [], unidadesPorCot: {} };

        return (
          <div key={item.id} style={{ ...S.card, borderLeft: "3px solid " + borderColor }}>
            {/* Header */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              {item.thumbnail && <img src={item.thumbnail} alt="" style={{ width: 40, height: 40, borderRadius: "var(--border-radius-sm)", objectFit: "cover" }} />}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 500, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 2 }}>
                  <span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>${fmt(item.price)}</span>
                  <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 100, background: item.status === 'active' ? "var(--color-background-success)" : "var(--color-background-warning)", color: item.status === 'active' ? "var(--color-text-success)" : "var(--color-text-warning)" }}>{item.status === 'active' ? 'Activo' : item.status === 'paused' ? 'Pausado' : item.status}</span>
                  <span style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>{item.id}</span>
                </div>
              </div>
              <button onClick={() => setMappingItem(isMappingOpen ? null : item.id)} style={{ ...btnStyle(isMappingOpen), fontSize: 11, padding: "4px 10px" }}>
                {currentMapping.cotizaciones.length > 0 ? currentMapping.cotizaciones.length + ' cot.' : 'Asignar cot.'}
              </button>
            </div>

            {/* Cotizacion mapping panel */}
            {isMappingOpen && (
              <div style={{ padding: 12, background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", marginBottom: 10 }}>
                <p style={{ ...S.label, marginBottom: 8 }}>Asignar cotizaciones</p>
                {drive && drive.cotizaciones && drive.cotizaciones.length > 0 ? (
                  <div style={{ maxHeight: 200, overflowY: "auto" }}>
                    {drive.cotizaciones.map(cot => {
                      var isChecked = currentMapping.cotizaciones.indexOf(cot.id) >= 0;
                      var cotUnits = currentMapping.unidadesPorCot[cot.id] || 1;
                      return (
                        <div key={cot.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
                          <input type="checkbox" checked={isChecked} onChange={() => toggleCotMapping(item.id, cot.id)} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <span style={{ fontSize: 12, fontWeight: isChecked ? 500 : 400 }}>{cot.id} - {cot.producto ? cot.producto.nombre : 'Sin nombre'}</span>
                            {cot.resultados && <span style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginLeft: 6 }}>${fmt(cot.resultados.costoBodegaCLP)}/u</span>}
                          </div>
                          {isChecked && (
                            <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                              <input type="number" value={cotUnits} onChange={e => setCotUnits(item.id, cot.id, e.target.value)} style={{ ...S.input, width: 50, fontSize: 11, padding: "2px 4px", textAlign: "center" }} min="1" />
                              <span style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>u</span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <p style={{ fontSize: 12, color: "var(--color-text-tertiary)", margin: 0 }}>
                    {drive && drive.driveStatus === 'connected' ? 'No hay cotizaciones guardadas. Crea una en la pesta\u00f1a Calculadora.' : 'Conecta Google Drive para ver cotizaciones.'}
                  </p>
                )}
                {wc !== null && <div style={{ marginTop: 8, padding: "6px 10px", background: "var(--color-background-info)", borderRadius: "var(--border-radius-sm)", fontSize: 12, color: "var(--color-text-info)" }}>Costo ponderado: ${fmt(wc)}/u</div>}
              </div>
            )}

            {/* Metrics grid */}
            <div className="grid-4" style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0,1fr))", gap: 8 }}>
              {[
                { label: "Vendidas", val: d.totalQty + "u", color: "primary" },
                { label: "Ingresos", val: "$" + fmt(d.totalRevenue), color: "primary" },
                { label: "Comision ML", val: "$" + fmt(d.totalFee), color: "danger" },
                { label: "Envio neto", val: "$" + fmt(d.totalShipping), color: d.totalShipping >= 0 ? "success" : "danger" },
                { label: "Neto ML", val: "$" + fmt(netoItem), color: netoItem >= 0 ? "success" : "danger" },
                { label: "Costo import.", val: costoImportTotal !== null ? "$" + fmt(costoImportTotal) : "\u2014", color: "secondary", sub: wc !== null ? "$" + fmt(wc) + "/u" : "Sin cotizacion" },
                { label: "Publicidad", val: "$" + fmt(pubItem), color: pubItem > 0 ? "danger" : "secondary" },
                { label: "Ganancia", val: ganancia !== null ? "$" + fmt(ganancia) : "\u2014", color: ganancia !== null ? (ganancia > 0 ? "success" : "danger") : "secondary" },
                { label: "Margen real", val: margen !== null ? pct(margen) : "\u2014", color: colorMargen(margen) },
                { label: "Visitas / Conv.", val: fmt(visits) + " / " + (conversion !== null ? pct(conversion) : "\u2014"), color: "secondary" },
              ].map(m => (
                <div key={m.label} style={S.mc}>
                  <p style={S.label}>{m.label}</p>
                  <p style={{ fontSize: 14, fontWeight: 500, margin: 0, color: "var(--color-text-" + m.color + ")" }}>{m.val}</p>
                  {m.sub && <p style={S.sub}>{m.sub}</p>}
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {/* Empty state */}
      {!meli.loading && meli.items.length === 0 && meli.dashData && (
        <div style={{ textAlign: "center", padding: 40, color: "var(--color-text-tertiary)" }}>
          No se encontraron productos en tu cuenta de MercadoLibre.
        </div>
      )}
    </div>
  );
}

function TabComparador({ params }) {
  const [prod, setProd] = useState({ ali_precio: 4.5, ali_envio_incluido: true, ali_envio_costo: 0, ali_iva_incluido: false, alib_precio: 3.2, alib_unidades: 50, alib_flete: 80 });
  const set = (k, v) => setProd(p => ({ ...p, [k]: v }));

  const ali_cif = prod.ali_precio * params.usdClp + (prod.ali_envio_incluido ? 0 : prod.ali_envio_costo * params.usdClp);
  const ali_arancel = params.arancelActivo ? ali_cif * (params.arancel / 100) : 0;
  const ali_iva_costo = (!prod.ali_iva_incluido && params.ivaActivo) ? (ali_cif + ali_arancel) * (params.iva / 100) : 0;
  const ali_total = ali_cif + ali_arancel + ali_iva_costo;

  const alib_cif = prod.alib_precio * params.usdClp + (prod.alib_flete / (prod.alib_unidades || 1)) * params.usdClp;
  const alib_arancel = params.arancelActivo ? alib_cif * (params.arancel / 100) : 0;
  const alib_iva_base = params.ivaActivo ? (alib_cif + alib_arancel) * (params.iva / 100) : 0;
  const alib_iva_costo = (params.ivaActivo && !params.ivaRecuperable) ? alib_iva_base : 0;
  const alib_dhl = (params.dhlFee / (prod.alib_unidades || 1)) * params.usdClp;
  const alib_total = alib_cif + alib_arancel + alib_iva_costo + alib_dhl;

  const diferencia = ali_total - alib_total;
  const ganador = diferencia > 0 ? "Alibaba" : diferencia < 0 ? "Aliexpress" : "Empate";
  const pctDif = Math.abs(diferencia / Math.max(ali_total, alib_total)) * 100;

  return (
    <div>
      <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        <div style={S.card}>
          <p style={{ ...S.sectionLabel, color: "#f59e0b" }}>aliexpress</p>
          <Field label="Precio unitario" value={prod.ali_precio} onChange={v => set("ali_precio", v)} unit="USD" />
          <Toggle label="Env\u00edo incluido en precio" value={prod.ali_envio_incluido} onChange={v => set("ali_envio_incluido", v)} />
          {!prod.ali_envio_incluido && <Field label="Costo env\u00edo" value={prod.ali_envio_costo} onChange={v => set("ali_envio_costo", v)} unit="USD" />}
          <Toggle label="IVA incluido en precio" value={prod.ali_iva_incluido} onChange={v => set("ali_iva_incluido", v)} />
          <hr style={S.divider} />
          <div style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>CIF</span><span>${fmt(ali_cif)}</span></div>
          <div style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>Arancel {params.arancelActivo ? "(" + params.arancel + "%)" : "(inactivo)"}</span><span style={{ color: params.arancelActivo ? "var(--color-text-primary)" : "var(--color-text-tertiary)" }}>{params.arancelActivo ? "$" + fmt(ali_arancel) : "\u2014"}</span></div>
          <div style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>IVA ({params.iva}%) {prod.ali_iva_incluido ? "\u2014 incluido en precio" : "\u2014 costo adicional"}</span><span style={{ color: prod.ali_iva_incluido ? "var(--color-text-tertiary)" : "var(--color-text-danger)" }}>{prod.ali_iva_incluido ? "\u2014" : fmt(ali_iva_costo)}</span></div>
          <div style={S.row}><span style={{ color: "var(--color-text-tertiary)", fontSize: 11 }}>Honorarios DHL</span><span style={{ color: "var(--color-text-tertiary)", fontSize: 11 }}>N/A</span></div>
          <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontWeight: 500 }}>
            <span>Total bodega</span>
            <span style={{ fontSize: 18, color: diferencia > 0 ? "var(--color-text-danger)" : "var(--color-text-success)" }}>${fmt(ali_total)}</span>
          </div>
        </div>
        <div style={S.card}>
          <p style={{ ...S.sectionLabel, color: "#378ADD" }}>alibaba</p>
          <Field label="Precio unitario" value={prod.alib_precio} onChange={v => set("alib_precio", v)} unit="USD" />
          <Field label="Unidades del pedido" value={prod.alib_unidades} onChange={v => set("alib_unidades", v)} unit="unid." />
          <Field label="Flete total DHL" value={prod.alib_flete} onChange={v => set("alib_flete", v)} unit="USD" />
          <hr style={S.divider} />
          <div style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>CIF (producto + flete/u)</span><span>${fmt(alib_cif)}</span></div>
          <div style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>Arancel {params.arancelActivo ? "(" + params.arancel + "%)" : "(inactivo)"}</span><span style={{ color: params.arancelActivo ? "var(--color-text-primary)" : "var(--color-text-tertiary)" }}>{params.arancelActivo ? "$" + fmt(alib_arancel) : "\u2014"}</span></div>
          <div style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>IVA {!params.ivaActivo ? "(inactivo)" : params.ivaRecuperable ? "(recuperable)" : "(costo)"}</span><span style={{ color: !params.ivaActivo ? "var(--color-text-tertiary)" : params.ivaRecuperable ? "var(--color-text-success)" : "var(--color-text-danger)" }}>{!params.ivaActivo ? "\u2014" : params.ivaRecuperable ? "no es costo" : "$" + fmt(alib_iva_costo)}</span></div>
          <div style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>Honorarios DHL/u</span><span>${fmt(alib_dhl)}</span></div>
          <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontWeight: 500 }}>
            <span>Total bodega</span>
            <span style={{ fontSize: 18, color: diferencia < 0 ? "var(--color-text-danger)" : "var(--color-text-success)" }}>${fmt(alib_total)}</span>
          </div>
        </div>
      </div>
      <div style={{ ...S.card, textAlign: "center" }}>
        <p style={S.sectionLabel}>veredicto</p>
        <p style={{ fontSize: 28, fontWeight: 500, margin: "0 0 6px", color: ganador === "Alibaba" ? "#378ADD" : ganador === "Aliexpress" ? "#f59e0b" : "var(--color-text-primary)" }}>{ganador} es m&aacute;s barato</p>
        <p style={{ fontSize: 14, color: "var(--color-text-secondary)", margin: "0 0 12px" }}>por ${fmt(Math.abs(diferencia))} por unidad ({pct(pctDif)})</p>
        {!params.ivaRecuperable && <div style={S.alert("warning")}><p style={{ fontSize: 12, color: "var(--color-text-warning)", margin: 0 }}>Con IVA recuperable activado, Alibaba mejora relativamente porque genera DIN y cr&eacute;dito fiscal. Aliexpress no.</p></div>}
        {prod.alib_unidades < 20 && <div style={S.alert("info")}><p style={{ fontSize: 12, color: "var(--color-text-info)", margin: 0 }}>Con pedidos peque&ntilde;os ({prod.alib_unidades}u), el DHL diluye poco. Aumenta las unidades para ver c&oacute;mo mejora Alibaba con volumen.</p></div>}
      </div>
    </div>
  );
}

function TabEscalamiento({ params }) {
  const [cfg, setCfg] = useState({ aliPrecio: 4.5, aliEnvioIncluido: true, aliEnvioCosto: 0, alibPrecio: 3.2, alibFlete: 80, alibMOQ: 50, precioVenta: 9490 });
  const set = (k, v) => setCfg(p => ({ ...p, [k]: v }));

  const ali_cif = cfg.aliPrecio * params.usdClp + (cfg.aliEnvioIncluido ? 0 : cfg.aliEnvioCosto * params.usdClp);
  const ali_arancel = params.arancelActivo ? ali_cif * (params.arancel / 100) : 0;
  const ali_iva = (params.ivaActivo && !params.ivaRecuperable) ? (ali_cif + ali_arancel) * (params.iva / 100) : 0;
  const costo_ali = ali_cif + ali_arancel + ali_iva;

  const alib_cif = cfg.alibPrecio * params.usdClp + (cfg.alibFlete / (cfg.alibMOQ || 1)) * params.usdClp;
  const alib_arancel = params.arancelActivo ? alib_cif * (params.arancel / 100) : 0;
  const alib_iva = (params.ivaActivo && !params.ivaRecuperable) ? (alib_cif + alib_arancel) * (params.iva / 100) : 0;
  const alib_dhl = (params.dhlFee / (cfg.alibMOQ || 1)) * params.usdClp;
  const costo_alib = alib_cif + alib_arancel + alib_iva + alib_dhl;

  const mlDeductions = (params.mlComision + params.mlFull) / 100;
  const netoML = cfg.precioVenta * (1 - mlDeductions);
  const margen_ali = netoML - costo_ali, margen_alib = netoML - costo_alib;
  const alibConviene = costo_alib < costo_ali;
  const niveles = [10, 20, 30, 50, 100];

  return (
    <div>
      <div className="grid-main" style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 16 }}>
        <div>
          <div style={S.card}>
            <p style={S.sectionLabel}>aliexpress (testeo)</p>
            <Field label="Precio unitario" value={cfg.aliPrecio} onChange={v => set("aliPrecio", v)} unit="USD" />
            <Toggle label="Env\u00edo incluido" value={cfg.aliEnvioIncluido} onChange={v => set("aliEnvioIncluido", v)} />
            {!cfg.aliEnvioIncluido && <Field label="Costo env\u00edo" value={cfg.aliEnvioCosto} onChange={v => set("aliEnvioCosto", v)} unit="USD" />}
          </div>
          <div style={S.card}>
            <p style={S.sectionLabel}>alibaba (escala)</p>
            <Field label="Precio unitario" value={cfg.alibPrecio} onChange={v => set("alibPrecio", v)} unit="USD" />
            <Field label="MOQ (m&iacute;nimo pedido)" value={cfg.alibMOQ} onChange={v => set("alibMOQ", v)} unit="unid." />
            <Field label="Flete total DHL" value={cfg.alibFlete} onChange={v => set("alibFlete", v)} unit="USD" />
          </div>
          <div style={S.card}>
            <p style={S.sectionLabel}>precio de venta ML</p>
            <Field label="Precio de venta" value={cfg.precioVenta} onChange={v => set("precioVenta", v)} unit="CLP" />
          </div>
        </div>
        <div>
          <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
            {[
              { label: "Costo bodega Aliexpress", val: costo_ali, color: "warning" },
              { label: "Costo bodega Alibaba", val: costo_alib, color: "info" },
              { label: "Margen neto con Aliexpress", val: margen_ali, color: margen_ali > 0 ? "success" : "danger" },
              { label: "Margen neto con Alibaba", val: margen_alib, color: margen_alib > 0 ? "success" : "danger" },
            ].map(item => (
              <div key={item.label} style={S.mc}><p style={S.label}>{item.label}</p><p style={{ ...S.val, fontSize: 18, color: "var(--color-text-" + item.color + ")" }}>${fmt(item.val)}</p><p style={S.sub}>por unidad</p></div>
            ))}
          </div>
          <div style={S.card}>
            <p style={S.sectionLabel}>ahorro mensual al escalar a alibaba</p>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr style={{ borderBottom: "0.5px solid var(--color-border-tertiary)" }}>{["Unidades/mes","Ahorro mensual","Ahorro anual","\u00bfConviene?"].map((h,i) => (<th key={h} style={{ textAlign: i===0?"left":"right", padding: "6px 0", color: "var(--color-text-tertiary)", fontWeight: 400 }}>{h}</th>))}</tr></thead>
              <tbody>
                {niveles.map(n => {
                  const ahorro = (costo_ali - costo_alib) * n;
                  const cumpleMOQ = n >= cfg.alibMOQ;
                  return (
                    <tr key={n} style={{ borderBottom: "0.5px solid var(--color-border-tertiary)", background: cumpleMOQ && alibConviene ? "var(--color-background-success)" : "transparent" }}>
                      <td style={{ padding: "7px 0", fontWeight: cumpleMOQ ? 500 : 400 }}>{n}u</td>
                      <td style={{ textAlign: "right", padding: "7px 0", color: ahorro > 0 ? "var(--color-text-success)" : "var(--color-text-danger)" }}>${fmt(ahorro)}</td>
                      <td style={{ textAlign: "right", padding: "7px 0", color: ahorro > 0 ? "var(--color-text-success)" : "var(--color-text-danger)" }}>${fmt(ahorro * 12)}</td>
                      <td style={{ textAlign: "right", padding: "7px 0" }}>{!cumpleMOQ ? <span style={S.pill("warning")}>bajo MOQ</span> : alibConviene ? <span style={S.pill("success")}>s&iacute;</span> : <span style={S.pill("danger")}>no</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <p style={{ fontSize: 11, color: "var(--color-text-tertiary)", margin: "10px 0 0" }}>MOQ m&iacute;nimo de Alibaba: {cfg.alibMOQ} unidades.</p>
          </div>
          {!alibConviene && <div style={S.alert("warning")}><p style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-warning)", margin: "0 0 2px" }}>Atenci&oacute;n: con estos precios, Aliexpress es m&aacute;s barato por unidad</p><p style={{ fontSize: 12, color: "var(--color-text-warning)", margin: 0 }}>Revisa el precio de Alibaba o negocia mejor el flete.</p></div>}
        </div>
      </div>
    </div>
  );
}

function TabPublicidad({ params }) {
  const [cfg, setCfg] = useState({ precioVenta: 10490, costoProducto: 2640, roasActual: 4, acosObjetivo: 20, ventasMes: 23, ventasAds: 15, pubMensual: 101768 });
  const set = (k, v) => setCfg(p => ({ ...p, [k]: v }));

  const mlDed = (params.mlComision + params.mlFull) / 100;
  const netoML_pu = cfg.precioVenta * (1 - mlDed);
  const margenDisponible = netoML_pu - cfg.costoProducto;
  const acosMaxRentable = margenDisponible / cfg.precioVenta * 100;
  const acosActual = 1 / cfg.roasActual * 100;
  const pubPorVenta = cfg.pubMensual / (cfg.ventasAds || 1);
  const margenConAds = margenDisponible - pubPorVenta;
  const margenSinAds = margenDisponible;
  const ventasIncrNecesarias = cfg.pubMensual / margenSinAds;
  const ingresosPorVentaAds = cfg.ventasAds > 0 ? cfg.ventasAds * cfg.precioVenta / 30 : 0;
  const pptoOptimo = ingresosPorVentaAds * (cfg.acosObjetivo / 100);
  const escenarios = [
    { roas: 2, label: "ROAS 2 \u2014 malo" }, { roas: 3, label: "ROAS 3 \u2014 aceptable" },
    { roas: 4, label: "ROAS 4 \u2014 tu caso" }, { roas: 6, label: "ROAS 6 \u2014 bueno" },
    { roas: 8, label: "ROAS 8 \u2014 excelente" },
  ];

  return (
    <div>
      <div className="grid-main" style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 16 }}>
        <div>
          <div style={S.card}>
            <p style={S.sectionLabel}>tu producto</p>
            <Field label="Precio de venta" value={cfg.precioVenta} onChange={v => set("precioVenta", v)} unit="CLP" />
            <Field label="Costo importaci&oacute;n/u" value={cfg.costoProducto} onChange={v => set("costoProducto", v)} unit="CLP" />
          </div>
          <div style={S.card}>
            <p style={S.sectionLabel}>tu campa&ntilde;a actual</p>
            <Field label="ROAS actual" value={cfg.roasActual} onChange={v => set("roasActual", v)} hint="Dato de ML Ads" />
            <Field label="Gasto mensual total" value={cfg.pubMensual} onChange={v => set("pubMensual", v)} unit="CLP" />
            <Field label="Ventas totales/mes" value={cfg.ventasMes} onChange={v => set("ventasMes", v)} unit="u" />
            <Field label="Ventas atribuidas a ads" value={cfg.ventasAds} onChange={v => set("ventasAds", v)} unit="u" />
          </div>
          <div style={S.card}>
            <p style={S.sectionLabel}>objetivo</p>
            <Field label="ACOS objetivo (%)" value={cfg.acosObjetivo} onChange={v => set("acosObjetivo", v)} unit="%" hint="Publicidad / Venta" />
          </div>
        </div>
        <div>
          <div className="grid-3" style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0,1fr))", gap: 10, marginBottom: 16 }}>
            <div style={S.mc}><p style={S.label}>Margen sin publicidad</p><p style={{ ...S.val, color: "var(--color-text-success)" }}>${fmt(margenSinAds)}</p><p style={S.sub}>por unidad &middot; {pct(margenSinAds / cfg.precioVenta * 100)}</p></div>
            <div style={S.mc}><p style={S.label}>Margen con publicidad</p><p style={{ ...S.val, color: margenConAds > 0 ? "var(--color-text-warning)" : "var(--color-text-danger)" }}>${fmt(margenConAds)}</p><p style={S.sub}>por unidad &middot; {pct(margenConAds / cfg.precioVenta * 100)}</p></div>
            <div style={S.mc}><p style={S.label}>ACOS m&aacute;ximo rentable</p><p style={{ ...S.val, color: acosActual <= acosMaxRentable ? "var(--color-text-success)" : "var(--color-text-danger)" }}>{pct(acosMaxRentable)}</p><p style={S.sub}>tu ACOS actual: {pct(acosActual)}</p></div>
          </div>
          <div style={S.card}>
            <p style={S.sectionLabel}>diagn&oacute;stico de tu campa&ntilde;a</p>
            {[
              { label: "ROAS actual", right: <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontWeight: 500 }}>{cfg.roasActual}x</span><span style={S.pill("success")}>mejor que 90% competidores</span></div> },
              { label: "ACOS actual (1/ROAS)", right: <span style={{ fontWeight: 500, color: acosActual <= acosMaxRentable ? "var(--color-text-success)" : "var(--color-text-danger)" }}>{pct(acosActual)}</span> },
              { label: "Costo publicidad por venta ads", right: <span style={{ fontWeight: 500 }}>${fmt(pubPorVenta)}</span> },
              { label: "Presupuesto diario \u00f3ptimo (ACOS " + cfg.acosObjetivo + "%)", right: <span style={{ fontWeight: 500, color: "var(--color-text-info)" }}>${fmt(pptoOptimo)}/d\u00eda</span> },
              { label: "Ventas incrementales necesarias para ROI positivo", right: <span style={{ fontWeight: 500, color: "var(--color-text-warning)" }}>{Math.ceil(ventasIncrNecesarias)}u/mes</span> },
            ].map((item, i) => (
              <div key={i} style={S.row}><span style={{ color: "var(--color-text-secondary)" }}>{item.label}</span>{item.right}</div>
            ))}
          </div>
          <div style={S.card}>
            <p style={S.sectionLabel}>simulador de escenarios ROAS &rarr; margen real</p>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr style={{ borderBottom: "0.5px solid var(--color-border-tertiary)" }}>{["Escenario","ACOS","Pub/venta","Margen real/u","Rentable"].map((h,i) => (<th key={h} style={{ textAlign: i===0?"left":"right", padding: "6px 0", fontWeight: 400, color: "var(--color-text-tertiary)" }}>{h}</th>))}</tr></thead>
              <tbody>
                {escenarios.map(e => {
                  const acos = 1/e.roas*100, pubU = cfg.precioVenta*(acos/100), margen = margenDisponible - pubU;
                  const esCaso = e.roas === cfg.roasActual;
                  return (
                    <tr key={e.roas} style={{ borderBottom: "0.5px solid var(--color-border-tertiary)", background: esCaso ? "var(--color-background-info)" : "transparent" }}>
                      <td style={{ padding: "7px 0", fontWeight: esCaso ? 500 : 400 }}>{e.label}</td>
                      <td style={{ textAlign: "right" }}>{pct(acos)}</td>
                      <td style={{ textAlign: "right" }}>${fmt(pubU)}</td>
                      <td style={{ textAlign: "right", fontWeight: 500, color: margen > 0 ? "var(--color-text-success)" : "var(--color-text-danger)" }}>${fmt(margen)}</td>
                      <td style={{ textAlign: "right" }}>{margen > 0 ? <span style={S.pill("success")}>s&iacute;</span> : <span style={S.pill("danger")}>no</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {acosActual > acosMaxRentable
            ? <div style={S.alert("danger")}><p style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-danger)", margin: "0 0 2px" }}>Tu ACOS actual ({pct(acosActual)}) supera el m&aacute;ximo rentable ({pct(acosMaxRentable)})</p><p style={{ fontSize: 12, color: "var(--color-text-danger)", margin: 0 }}>Sube el precio o baja el presupuesto diario a ${fmt(pptoOptimo)}.</p></div>
            : <div style={S.alert("success")}><p style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-success)", margin: "0 0 2px" }}>Tu ACOS actual est&aacute; dentro del rango rentable</p><p style={{ fontSize: 12, color: "var(--color-text-success)", margin: 0 }}>Con ROAS {cfg.roasActual} y precio ${fmt(cfg.precioVenta)}, la publicidad genera margen positivo de ${fmt(margenConAds)}/u.</p></div>
          }
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   APP — Main component with Google Drive integration
   ================================================================ */
function App() {
  const [tab, setTab] = useState("pricing");
  const [params, setParams] = useState(DEFAULT_PARAMS);
  const [showParams, setShowParams] = useState(false);
  const drive = useGoogleDrive();
  const meli = useMercadoLibre(drive);

  useEffect(function() {
    if (drive.driveStatus === 'connected') drive.refreshCotizaciones();
  }, [drive.driveStatus]);

  const dsMap = {
    loading: { text: 'Conectando...', css: 'loading' },
    ready: { text: 'Conectar Google Drive', css: 'disconnected' },
    connected: { text: 'Drive conectado', css: 'connected' },
    unavailable: { text: 'Drive no disponible', css: 'disconnected' },
    error: { text: 'Error de conexi\u00f3n', css: 'disconnected' },
  };
  const ds = dsMap[drive.driveStatus] || dsMap.ready;

  const mlStatusMap = {
    disconnected: { text: 'Conectar MercadoLibre', css: 'disconnected' },
    loading: { text: 'Conectando ML...', css: 'loading' },
    connected: { text: meli.meliUser ? meli.meliUser.nickname : 'ML conectado', css: 'connected' },
    error: { text: 'Error ML', css: 'disconnected' },
  };
  const ms = mlStatusMap[meli.meliStatus] || mlStatusMap.disconnected;

  return (
    <div style={{ minHeight: "100vh", background: "var(--color-background-tertiary)", fontFamily: "var(--font-sans)" }}>
      <div className="header-bar" style={{ background: "var(--color-background-primary)", borderBottom: "0.5px solid var(--color-border-tertiary)", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
        <div>
          <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 2 }}>FIXIT SPA</div>
          <div style={{ fontSize: 18, fontWeight: 500, color: "var(--color-text-primary)" }}>Centro de control &middot; Importaci&oacute;n & ML</div>
        </div>
        <div className="header-right" style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {/* MercadoLibre indicator */}
          {meli.meliStatus === 'connected' ? (
            <div className={'drive-indicator ' + ms.css} title={'Conectado como ' + (meli.meliUser ? meli.meliUser.nickname : '')}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--color-text-info)', display: 'inline-block' }} />
              <span style={{ maxWidth: 100, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{ms.text}</span>
              <button onClick={meli.logout} style={{ fontSize: 10, padding: '1px 6px', background: 'transparent', border: '1px solid var(--color-border-info)', borderRadius: 100, color: 'var(--color-text-info)', cursor: 'pointer', fontFamily: 'inherit', marginLeft: 4 }}>salir</button>
            </div>
          ) : (
            <div className={'drive-indicator ' + ms.css} onClick={meli.meliStatus === 'disconnected' ? meli.login : undefined} title={meli.meliStatus === 'disconnected' ? 'Haz clic para conectar MercadoLibre' : ''} style={{ cursor: meli.meliStatus === 'disconnected' ? 'pointer' : 'default' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: meli.meliStatus === 'loading' ? 'var(--color-text-warning)' : 'var(--color-text-tertiary)', display: 'inline-block' }} />
              <span>{ms.text}</span>
            </div>
          )}
          {/* Google Drive indicator */}
          {drive.driveStatus === 'connected' ? (
            <div className={'drive-indicator ' + ds.css} title="Conectado a Google Drive">
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--color-text-success)', display: 'inline-block' }} />
              <span>{ds.text}</span>
              <button onClick={drive.logout} style={{ fontSize: 10, padding: '1px 6px', background: 'transparent', border: '1px solid var(--color-border-success)', borderRadius: 100, color: 'var(--color-text-success)', cursor: 'pointer', fontFamily: 'inherit', marginLeft: 4 }}>salir</button>
            </div>
          ) : (
            <div className={'drive-indicator ' + ds.css} onClick={drive.driveStatus === 'ready' ? drive.login : undefined} title={drive.driveStatus === 'ready' ? 'Haz clic para conectar' : ''}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: drive.driveStatus === 'loading' ? 'var(--color-text-warning)' : 'var(--color-text-tertiary)', display: 'inline-block' }} />
              <span>{ds.text}</span>
            </div>
          )}
          <button onClick={() => setShowParams(!showParams)} style={{ fontSize: 12, padding: "7px 14px", background: showParams ? "var(--color-background-info)" : "var(--color-background-secondary)", border: "0.5px solid var(--color-border-secondary)", borderRadius: "var(--border-radius-md)", cursor: "pointer", color: showParams ? "var(--color-text-info)" : "var(--color-text-secondary)", fontFamily: "inherit" }}>
            {showParams ? "Ocultar par\u00e1metros" : "Par\u00e1metros globales"}
          </button>
        </div>
      </div>

      {showParams && (
        <div className="params-area" style={{ padding: "16px 24px 0", maxWidth: 900, margin: "0 auto" }}>
          <ParamsPanel params={params} setParams={setParams} />
        </div>
      )}

      <div className="tab-bar" style={{ background: "var(--color-background-primary)", borderBottom: "0.5px solid var(--color-border-tertiary)", padding: "0 24px", display: "flex", gap: 0 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: "none", border: "none", borderBottom: tab === t.id ? "2px solid var(--color-border-info)" : "2px solid transparent", padding: "12px 16px", cursor: "pointer", fontSize: 13, color: tab === t.id ? "var(--color-text-info)" : "var(--color-text-secondary)", fontFamily: "inherit", transition: "all 0.15s", whiteSpace: "nowrap" }}>
            {t.label}
          </button>
        ))}
      </div>

      <div className="content-area" style={{ padding: "20px 24px", maxWidth: 1100, margin: "0 auto" }}>
        {tab === "pricing" && <TabPricing params={params} setParams={setParams} drive={drive} />}
        {tab === "dashboard" && <TabDashboard params={params} drive={drive} meli={meli} />}
        {tab === "comparador" && <TabComparador params={params} />}
        {tab === "escalamiento" && <TabEscalamiento params={params} />}
        {tab === "publicidad" && <TabPublicidad params={params} />}
      </div>

      <NotificationToast notification={drive.notification} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
